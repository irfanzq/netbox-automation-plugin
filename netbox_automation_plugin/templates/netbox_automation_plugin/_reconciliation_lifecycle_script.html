{% load i18n %}
<script>
  (function() {
    function csrfToken() {
      var el = document.querySelector("#recon-csrf-anchor input[name=csrfmiddlewaretoken]");
      return el ? el.value : "";
    }
    var loadingBtnHtml = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>{% filter escapejs %}{% trans "Working…" %}{% endfilter %}';
    function lifecycleButtons() {
      return document.querySelectorAll(".js-recon-lifecycle-btn");
    }
    function setLifecycleBusy(busy, activeBtn) {
      if (busy) {
        lifecycleButtons().forEach(function(b) {
          b.disabled = true;
          if (activeBtn && b === activeBtn) {
            b.dataset.reconSavedHtml = b.innerHTML;
            b.innerHTML = loadingBtnHtml;
          }
        });
      } else {
        lifecycleButtons().forEach(function(b2) {
          if (b2.dataset.reconSavedHtml) {
            b2.innerHTML = b2.dataset.reconSavedHtml;
            delete b2.dataset.reconSavedHtml;
          }
          b2.disabled = b2.getAttribute("data-initial-disabled") === "true";
        });
      }
    }
    function postAction(url, btn, opts) {
      opts = opts || {};
      if (!url || !btn) return;
      var msg = opts.errorTargetId
        ? document.getElementById(opts.errorTargetId)
        : document.getElementById("reconApplyMsg");
      var willNavigate = false;
      if (msg) msg.textContent = "";
      setLifecycleBusy(true, btn);
      var fetchOpts = {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfToken()
        },
        body: opts.body != null ? opts.body : "{}"
      };
      if (typeof AbortSignal !== "undefined" && typeof AbortSignal.timeout === "function") {
        fetchOpts.signal = AbortSignal.timeout(720000);
      }
      fetch(url, fetchOpts).then(function(r) {
        return r.json().then(function(j) { return { ok: r.ok, body: j }; });
      }).then(function(res) {
        if (res.ok && res.body && res.body.ok) {
          try {
            if (window.napReconApplyResultsCache && typeof window.napReconApplyResultsCache.store === "function") {
              window.napReconApplyResultsCache.store(
                res.body.run_id,
                res.body.apply_results,
                res.body.status
              );
            }
          } catch (eStore) {}
          if (opts.clearRunApplyCache) {
            try {
              var lc0 = document.getElementById("reconLifecycleCard");
              var rpk0 = lc0 && lc0.getAttribute("data-recon-run-pk");
              if (window.napReconApplyResultsCache && rpk0 && typeof window.napReconApplyResultsCache.clear === "function") {
                window.napReconApplyResultsCache.clear(rpk0);
              }
            } catch (eClr) {}
          }
          var stayOnPage = !!opts.stayOnPageOnSuccess;
          willNavigate = true;
          if (stayOnPage) {
            if (msg) msg.textContent = "{% filter escapejs %}{% trans "Action complete. Refreshing…" %}{% endfilter %}";
            window.location.reload();
            return;
          }
          var dest = res.body.redirect_url || opts.fallbackRedirect || "";
          if (dest) {
            var applyResultsDest = dest.indexOf("/apply-results/") !== -1;
            function destWithCacheBust(u) {
              var sep = u.indexOf("?") >= 0 ? "&" : "?";
              return u + sep + "_nap_apply_refresh=" + Date.now();
            }
            // Always load apply results in **this** tab (do not rely on window.open). Popups
            // were racing read replicas / commit visibility: the new tab often GETs before
            // ``apply_results`` is readable, so the first paint looked empty; a second apply
            // then showed skipped/updated from the first run. A short delay + cache-bust URL
            // gives the ORM commit time to propagate on typical primary/replica setups.
            // Slightly longer delay before GET apply-results so ORM commits / read replicas are
            // more likely to see ``apply_results`` on first paint (see apply-results snapshot poll).
            var navDelayMs = applyResultsDest ? 600 : 250;
            if (applyResultsDest) {
              if (msg) msg.textContent = "{% filter escapejs %}{% trans "Opening results…" %}{% endfilter %}";
              window.setTimeout(function () {
                window.location.href = destWithCacheBust(dest);
              }, navDelayMs);
            } else {
              if (msg) msg.textContent = "{% filter escapejs %}{% trans "Opening results…" %}{% endfilter %}";
              window.location.href = dest;
            }
          } else {
            if (msg) msg.textContent = "{% filter escapejs %}{% trans "Action complete. Refreshing…" %}{% endfilter %}";
            window.location.reload();
          }
          return;
        }
        if (msg) msg.textContent = (res.body && res.body.error) ? res.body.error : "{% filter escapejs %}{% trans "Request failed." %}{% endfilter %}";
      }).catch(function(err) {
        if (msg) msg.textContent = String(err);
      }).finally(function() {
        if (willNavigate) return;
        setLifecycleBusy(false, null);
      });
    }
    document.querySelectorAll(".js-recon-page-link").forEach(function(a) {
      a.addEventListener("click", function(ev) {
        if (a.classList.contains("disabled")) {
          ev.preventDefault();
          return;
        }
        var href = a.getAttribute("href");
        if (!href || href === "#") return;
        var label = a.getAttribute("data-loading-label") || a.textContent.trim();
        var spin = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>' + label;
        if (a.getAttribute("target") === "_blank") {
          var origHtml = a.innerHTML;
          a.classList.add("disabled");
          a.innerHTML = spin;
          window.setTimeout(function() {
            a.innerHTML = origHtml;
            a.classList.remove("disabled");
          }, 600);
          return;
        }
        a.classList.add("disabled");
        a.innerHTML = spin;
      });
    });
    var applyBtn = document.querySelector(".js-recon-apply");
    var applyResultsUrl = "{{ apply_results_url|escapejs }}";
    var retryUrl = "{{ retry_failed_url|escapejs }}";
    if (applyBtn) {
      applyBtn.addEventListener("click", function() {
        postAction("{{ apply_url|escapejs }}", applyBtn, {
          fallbackRedirect: applyResultsUrl
        });
      });
    }
    function wireRetry(btn, payload) {
      if (!btn) return;
      btn.addEventListener("click", function() {
        postAction(retryUrl, btn, {
          fallbackRedirect: applyResultsUrl,
          body: JSON.stringify(payload || { retry: "failed" })
        });
      });
    }
    wireRetry(document.querySelector(".js-recon-retry-failed"), { retry: "failed" });
    wireRetry(document.querySelector(".js-recon-retry-skipped"), { retry: "skipped" });
    wireRetry(document.querySelector(".js-recon-retry-both"), { retry: "both" });
    var recheckBtn = document.querySelector(".js-recon-recheck-branch");
    if (recheckBtn) {
      recheckBtn.addEventListener("click", function() {
        postAction("{{ recheck_branch_url|escapejs }}", recheckBtn, {
          fallbackRedirect: applyResultsUrl,
          errorTargetId: "reconRecheckBranchMsg",
        });
      });
    }
    var discardBtn = document.querySelector(".js-recon-discard");
    if (discardBtn) {
      discardBtn.addEventListener("click", function() {
        if (!confirm("{% trans 'Discard this run and delete its NetBox branch when possible? This cannot be undone.' %}")) {
          return;
        }
        postAction("{{ discard_url|escapejs }}", discardBtn, {
          fallbackRedirect: "{{ recon_detail_url|escapejs }}",
          clearRunApplyCache: true,
        });
      });
    }
    var lc = document.getElementById("reconLifecycleCard");
    if (lc && lc.getAttribute("data-recon-branch-pg-poll-url")) {
      var purl = lc.getAttribute("data-recon-branch-pg-poll-url");
      var pms = parseInt(lc.getAttribute("data-recon-branch-pg-poll-interval-ms") || "5000", 10);
      var pmax = parseInt(lc.getAttribute("data-recon-branch-pg-poll-max-ticks") || "36", 10);
      var msgPoll = document.getElementById("reconApplyMsg");
      if (msgPoll) {
        msgPoll.textContent = "{% filter escapejs %}{% trans "Checking branch database in the background…" %}{% endfilter %}";
      }
      var pollCount = 0;
      var pollTimer = null;
      function runBranchPgPoll() {
        pollCount += 1;
        if (pollCount > pmax) {
          if (pollTimer) {
            window.clearInterval(pollTimer);
          }
          var inner = document.getElementById("reconBranchSchemaWaitOverlayInner");
          if (inner) {
            inner.innerHTML = "<p class=\"text-danger fw-semibold mb-2\">{% filter escapejs %}{% trans "Branch schema is still not ready after automatic polling." %}{% endfilter %}</p><p class=\"small text-muted mb-0\">{% filter escapejs %}{% trans "Refresh this page or wait and try again. Apply remains disabled until the branch session leaves the main (public) schema." %}{% endfilter %}</p>";
          }
          if (msgPoll) {
            msgPoll.textContent = "{% filter escapejs %}{% trans "Automatic polling stopped. Refresh when ready." %}{% endfilter %}";
          }
          return;
        }
        fetch(purl, { credentials: "same-origin", headers: { Accept: "application/json" } })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.ready) {
              if (pollTimer) {
                window.clearInterval(pollTimer);
              }
              window.location.reload();
            }
          })
          .catch(function() {});
      }
      runBranchPgPoll();
      pollTimer = window.setInterval(runBranchPgPoll, pms);
    }
  })();
</script>
