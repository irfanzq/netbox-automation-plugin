{% load i18n %}
<script>
(function() {
  function csrfToken() {
    var inp = document.querySelector("input[name=csrfmiddlewaretoken]");
    if (inp && inp.value) return inp.value;
    var m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : "";
  }
  function readErrorText(r) {
    return r.text().then(function(t) { return t || r.statusText || String(r.status); });
  }
  var overlay = document.getElementById("drift-xlsx-loading-overlay");
  function showXlsxOverlay() {
    if (!overlay) return;
    overlay.classList.add("drift-loading-visible");
    overlay.setAttribute("aria-hidden", "false");
  }
  function hideXlsxOverlay() {
    if (!overlay) return;
    overlay.classList.remove("drift-loading-visible");
    overlay.setAttribute("aria-hidden", "true");
  }
  function downloadBlob(blob, filename) {
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename || "report.xlsx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
  function fetchGetXlsx(url, filename) {
    showXlsxOverlay();
    return fetch(url, { credentials: "same-origin" })
      .then(function(r) {
        if (!r.ok) throw new Error(r.statusText || String(r.status));
        return r.blob();
      })
      .then(function(blob) { downloadBlob(blob, filename); })
      .catch(function(e) { console.warn("Excel download failed:", e); })
      .finally(hideXlsxOverlay);
  }
  document.addEventListener("click", function(e) {
    var a = e.target.closest("a.js-drift-xlsx-get");
    if (!a || !a.getAttribute("href")) return;
    e.preventDefault();
    var href = a.getAttribute("href");
    var name = a.getAttribute("data-download-name") || "drift-report.xlsx";
    fetchGetXlsx(href, name);
  });
  document.addEventListener("click", function(e) {
    var btn = e.target.closest("button.js-drift-xlsx-modified-live");
    if (!btn) return;
    e.preventDefault();
    var postUrl = (window._driftXlsxUiConfig && window._driftXlsxUiConfig.postModifiedUrl) || "";
    if (!postUrl) {
      alert("{% trans 'Modified Excel URL is not configured on this page.' %}");
      return;
    }
    var tok = csrfToken();
    if (!tok) {
      alert("{% trans 'Missing CSRF token. Reload the page and try again.' %}");
      return;
    }
    var overrides = {};
    try {
      var collect = window.DriftReviewCollectOverrides;
      overrides = typeof collect === "function" ? collect() : {};
    } catch (err) {
      console.warn("DriftReviewCollectOverrides failed:", err);
      alert("{% trans 'Could not read cell edits from the report.' %}");
      return;
    }
    showXlsxOverlay();
    fetch(postUrl, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": tok
      },
      body: JSON.stringify({ overrides: overrides })
    })
      .then(function(r) {
        if (!r.ok) {
          return readErrorText(r).then(function(msg) {
            throw new Error(msg);
          });
        }
        return r.blob();
      })
      .then(function(blob) { downloadBlob(blob, "drift-report-modified.xlsx"); })
      .catch(function(err) {
        console.warn("Modified Excel download failed:", err);
        alert("{% trans 'Modified Excel download failed.' %} " + (err && err.message ? err.message : ""));
      })
      .finally(hideXlsxOverlay);
  });
  document.addEventListener("click", function(e) {
    var saveBtn = e.target.closest("button.js-drift-save-review");
    if (!saveBtn) return;
    e.preventDefault();
    var url = (window._driftXlsxUiConfig && window._driftXlsxUiConfig.saveReviewUrl) || "";
    if (!url) {
      alert("{% trans 'Save review URL is not configured (no drift run id). Run a new audit or open this report from history.' %}");
      return;
    }
    var tok = csrfToken();
    if (!tok) {
      alert("{% trans 'Missing CSRF token. Reload the page and try again.' %}");
      return;
    }
    var overrides = {};
    try {
      var collect = window.DriftReviewCollectOverrides;
      overrides = typeof collect === "function" ? collect() : {};
    } catch (err) {
      console.warn("DriftReviewCollectOverrides failed:", err);
      alert("{% trans 'Could not read cell edits from the report.' %}");
      return;
    }
    saveBtn.disabled = true;
    fetch(url, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": tok
      },
      body: JSON.stringify({ overrides: overrides })
    })
      .then(function(r) {
        return r.text().then(function(t) {
          var j = {};
          try {
            j = t ? JSON.parse(t) : {};
          } catch (ignore) {
            j = { ok: false, error: t || r.statusText || "Save failed" };
          }
          return { r: r, j: j };
        });
      })
      .then(function(pair) {
        if (!pair.r.ok || !pair.j.ok) {
          throw new Error((pair.j && pair.j.error) || pair.r.statusText || "Save failed");
        }
        if (pair.j.reload && window.DriftReviewReloadAfterSave === true) {
          window.location.reload();
          return;
        }
        if (typeof window.DriftReviewOnSaved === "function") {
          window.DriftReviewOnSaved(pair.j);
        } else {
          alert("{% trans 'Review edits saved.' %}");
        }
      })
      .catch(function(err) {
        console.warn("Save review failed:", err);
        alert("{% trans 'Could not save review edits.' %} " + (err && err.message ? err.message : ""));
      })
      .finally(function() { saveBtn.disabled = false; });
  });
})();
</script>
