{% load i18n %}
{% if drift_nb_picker_catalog is not None %}
{{ drift_nb_picker_catalog|json_script:"drift-nb-picker-catalog" }}
<style>
  .drift-editable-text[contenteditable="true"] {
    cursor: text;
    min-height: 1.2rem;
    border-bottom: 1px dashed var(--bs-primary);
    padding-bottom: 1px;
  }
  .drift-editable-text[contenteditable="true"]:focus {
    outline: 1px solid var(--bs-primary);
    border-bottom-style: solid;
    border-radius: 2px;
    background: rgba(var(--bs-primary-rgb), 0.06);
  }
  .drift-th-pick-row {
    flex-wrap: nowrap !important;
  }
  .drift-th-pick-label {
    white-space: nowrap;
  }
  .drift-nb-pick-toggle {
    flex-shrink: 0;
    line-height: 1.1;
    min-width: 1.5rem;
    align-self: center;
  }
  .drift-nb-pick-menu .drift-nb-pick-options .list-group-item {
    font-size: 0.8125rem;
    border-left: none;
    border-right: none;
  }
  .drift-nb-pick-menu .drift-nb-pick-q {
    font-size: 0.8125rem;
  }
</style>
<script>
(function() {
  var el = document.getElementById("drift-nb-picker-catalog");
  try {
    window.DriftNbPickerChoices = el ? JSON.parse(el.textContent) : {};
  } catch (e) {
    window.DriftNbPickerChoices = {};
  }

  window.__driftReviewDirty = false;
  window.DriftReviewMarkDirty = function() {
    window.__driftReviewDirty = true;
  };
  window.DriftReviewMarkClean = function() {
    window.__driftReviewDirty = false;
  };

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function visiblePlain(el) {
    return el ? el.textContent.replace(/\s+/g, " ").trim() : "";
  }

  function highlight(name, q) {
    var e = esc(name);
    var t = (q || "").trim();
    if (!t) return e;
    var low = name.toLowerCase();
    var lt = t.toLowerCase();
    var i = low.indexOf(lt);
    if (i < 0) return e;
    return (
      esc(name.slice(0, i)) +
      '<mark class="bg-warning bg-opacity-50 text-dark">' +
      esc(name.slice(i, i + lt.length)) +
      "</mark>" +
      esc(name.slice(i + lt.length))
    );
  }

  function filterList(items, q) {
    var parts = (q || "").toLowerCase().split(/\s+/).filter(Boolean);
    if (!parts.length) return items.slice();
    return items.filter(function(name) {
      var n = String(name).toLowerCase();
      return parts.every(function(p) { return n.indexOf(p) >= 0; });
    });
  }

  function getTenantPickerAllowSet() {
    if (!window.__driftTenantPickerAllowSet) {
      var o = {};
      var arr = (window.DriftNbPickerChoices && window.DriftNbPickerChoices.tenant) || [];
      arr.forEach(function(x) {
        o[String(x)] = true;
      });
      window.__driftTenantPickerAllowSet = o;
    }
    return window.__driftTenantPickerAllowSet;
  }

  function isAllowedDriftTenantCellValue(t) {
    var s = (t || "").replace(/\s+/g, " ").trim();
    if (!s || s === "—" || s === "-") return true;
    return !!getTenantPickerAllowSet()[s];
  }

  function getMenu(wrap) {
    if (!wrap.__driftMenuEl) {
      wrap.__driftMenuEl = wrap.querySelector(".drift-nb-pick-menu");
    }
    return wrap.__driftMenuEl;
  }

  function closeAllMenus() {
    document.querySelectorAll(".drift-nb-pick-menu").forEach(function(menu) {
      if (menu.classList.contains("d-none")) return;
      var w = menu.__driftOwner || menu.closest(".drift-nb-pick");
      menu.classList.add("d-none");
      if (menu.parentNode === document.body && w) {
        w.appendChild(menu);
      }
      delete menu.__driftOwner;
      if (w) {
        var tb = w.querySelector(".drift-nb-pick-toggle");
        if (tb) tb.setAttribute("aria-expanded", "false");
      }
    });
  }

  function applyBulkNbPick(bulkWrap, name) {
    var table = bulkWrap.closest("table");
    if (!table) return;
    var dci = bulkWrap.getAttribute("data-drift-data-col-idx");
    if (dci === null || dci === "") return;
    var colIdx = parseInt(dci, 10);
    if (isNaN(colIdx) || colIdx < 0) return;
    var tdIndex = colIdx + 1;
    var rows = table.querySelectorAll("tbody tr");
    var changed = 0;
    rows.forEach(function(tr) {
      var inc = tr.querySelector("input.drift-include-row");
      if (!inc || !inc.checked) return;
      var cells = tr.querySelectorAll("td");
      if (tdIndex >= cells.length) return;
      var td = cells[tdIndex];
      var cellPick = td.querySelector(".drift-nb-pick:not(.drift-nb-pick-bulk)");
      if (!cellPick) return;
      var vis = cellPick.querySelector(".drift-nb-pick-visible");
      if (!vis) return;
      vis.textContent = name;
      changed += 1;
    });
    if (changed && typeof window.DriftReviewMarkDirty === "function") {
      window.DriftReviewMarkDirty();
    }
  }

  function repopulate(wrap) {
    var kind = wrap.getAttribute("data-nb-pick-kind") || "";
    var base = (window.DriftNbPickerChoices && window.DriftNbPickerChoices[kind]) || [];
    if (kind === "vlan") {
      var byScope = (window.DriftNbPickerChoices && window.DriftNbPickerChoices._vlan_by_scope_location) || {};
      var tr = wrap.closest("tr");
      var scopeWrap = tr ? tr.querySelector('.drift-nb-pick[data-drift-col-header="NB Proposed Scope"]') : null;
      var scopeEditable = tr ? tr.querySelector('.drift-editable-text[data-drift-col-header="NB Proposed Scope"]') : null;
      var scopeName = visiblePlain(scopeWrap ? scopeWrap.querySelector(".drift-nb-pick-visible") : scopeEditable);
      if (scopeName && byScope[scopeName] && byScope[scopeName].length) {
        base = byScope[scopeName];
      }
    }
    var list;
    if (kind === "tenant") {
      list = base.slice();
      if (list.indexOf("—") < 0) {
        list.unshift("—");
      }
    } else {
      list = base.slice();
      var cur0 = visiblePlain(wrap.querySelector(".drift-nb-pick-visible"));
      if (cur0 && cur0 !== "—" && list.indexOf(cur0) < 0) {
        list.unshift(cur0);
      }
    }
    var menu = getMenu(wrap);
    var qel = menu.querySelector(".drift-nb-pick-q");
    var q = qel ? qel.value : "";
    var filtered = filterList(list, q);
    var opts = menu.querySelector(".drift-nb-pick-options");
    if (!opts) return;
    opts.style.maxHeight =
      kind === "vm_cluster" || kind === "platform" ? "min(50vh, 22rem)" : "7.5rem";
    opts.innerHTML = "";
    filtered.forEach(function(name) {
      var b = document.createElement("button");
      b.type = "button";
      b.className =
        "list-group-item list-group-item-action py-1 px-2 text-start border-start-0 border-end-0";
      b.innerHTML = highlight(name, q);
      b.addEventListener("click", function(ev) {
        ev.preventDefault();
        ev.stopPropagation();
        if (wrap.getAttribute("data-drift-bulk") === "1") {
          applyBulkNbPick(wrap, name);
        } else {
          var vis = wrap.querySelector(".drift-nb-pick-visible");
          if (vis) vis.textContent = name;
          if (typeof window.DriftReviewMarkDirty === "function") {
            window.DriftReviewMarkDirty();
          }
        }
        closeAllMenus();
      });
      opts.appendChild(b);
    });
  }

  function openWrap(wrap) {
    closeAllMenus();
    var menu = getMenu(wrap);
    var btn = wrap.querySelector(".drift-nb-pick-toggle");
    if (!menu || !btn) return;
    document.body.appendChild(menu);
    menu.__driftOwner = wrap;
    var r = btn.getBoundingClientRect();
    var vw = window.innerWidth || 800;
    var left = Math.min(Math.max(8, r.left), vw - 200);
    menu.style.position = "fixed";
    menu.style.left = left + "px";
    menu.style.top = (r.bottom + 4) + "px";
    menu.style.zIndex = "10050";
    menu.classList.remove("d-none");
    btn.setAttribute("aria-expanded", "true");
    var qel = menu.querySelector(".drift-nb-pick-q");
    if (qel) qel.value = "";
    repopulate(wrap);
    if (qel) qel.focus();
    if (!wrap.__driftNbFilterBound) {
      wrap.__driftNbFilterBound = true;
      if (qel) {
        qel.addEventListener("input", function() {
          repopulate(wrap);
        });
        qel.addEventListener("click", function(e) {
          e.stopPropagation();
        });
      }
    }
  }

  document.addEventListener("click", function(evt) {
    var t = evt.target;
    if (!(t instanceof Element)) return;
    if (t.closest(".drift-nb-pick-menu")) {
      return;
    }
    var toggle = t.closest(".drift-nb-pick-toggle");
    if (toggle) {
      evt.preventDefault();
      evt.stopPropagation();
      var wrap = toggle.closest(".drift-nb-pick");
      if (!wrap) return;
      var menu = getMenu(wrap);
      var open = menu && !menu.classList.contains("d-none") && menu.parentNode === document.body;
      if (open) {
        closeAllMenus();
      } else {
        openWrap(wrap);
      }
      return;
    }
    closeAllMenus();
  });

  document.addEventListener("keydown", function(evt) {
    if (evt.key === "Escape") closeAllMenus();
  });

  window.DriftReviewCollectOverrides = function() {
    var out = {};
    document.querySelectorAll(".drift-nb-pick[data-drift-sel-key]").forEach(function(wrap) {
      var sk = wrap.getAttribute("data-drift-sel-key");
      var ri = wrap.getAttribute("data-drift-row-idx");
      var ch = wrap.getAttribute("data-drift-col-header");
      if (!sk || ri === null || !ch) return;
      var vis = wrap.querySelector(".drift-nb-pick-visible");
      var t = vis ? vis.textContent.replace(/\s+/g, " ").trim() : "";
      var kind = wrap.getAttribute("data-nb-pick-kind") || "";
      if (
        kind === "tenant" &&
        t &&
        !isAllowedDriftTenantCellValue(t) &&
        wrap.getAttribute("data-drift-tenant-allow-unlisted") !== "1"
      ) {
        t = "";
        if (vis) vis.textContent = "—";
      }
      if (t === "—") t = "";
      if (!out[sk]) out[sk] = {};
      if (!out[sk][ri]) out[sk][ri] = {};
      out[sk][ri][ch] = t;
    });
    document.querySelectorAll(".drift-editable-text[data-drift-sel-key]").forEach(function(el) {
      var sk = el.getAttribute("data-drift-sel-key");
      var ri = el.getAttribute("data-drift-row-idx");
      var ch = el.getAttribute("data-drift-col-header");
      if (!sk || ri === null || !ch) return;
      var t = el.textContent.replace(/\s+/g, " ").trim();
      if (!out[sk]) out[sk] = {};
      if (!out[sk][ri]) out[sk][ri] = {};
      out[sk][ri][ch] = t;
    });
    return out;
  };

  function captureDriftReviewBaselines() {
    document.querySelectorAll('.drift-nb-pick[data-nb-pick-kind="tenant"][data-drift-sel-key]').forEach(
      function(wrap) {
        var vis = wrap.querySelector(".drift-nb-pick-visible");
        if (!vis) return;
        var t = visiblePlain(vis);
        if (
          t &&
          !isAllowedDriftTenantCellValue(t) &&
          wrap.getAttribute("data-drift-tenant-allow-unlisted") !== "1"
        ) {
          vis.textContent = "—";
        }
      }
    );
    document.querySelectorAll(".drift-nb-pick[data-drift-sel-key]").forEach(function(wrap) {
      var vis = wrap.querySelector(".drift-nb-pick-visible");
      if (!vis || wrap.__driftBaselineCaptured) return;
      wrap.__driftOrigInner = vis.innerHTML;
      wrap.__driftBaselineCaptured = true;
    });
    document.querySelectorAll(".drift-editable-text[data-drift-sel-key]").forEach(function(el) {
      if (el.__driftBaselineCaptured) return;
      el.__driftOrigText = el.textContent;
      el.__driftBaselineCaptured = true;
      el.addEventListener("input", function() {
        if (typeof window.DriftReviewMarkDirty === "function") {
          window.DriftReviewMarkDirty();
        }
      });
    });
    document.querySelectorAll('.drift-nb-pick[data-drift-col-header="NB Proposed VLAN"]').forEach(function(wrap) {
      var vis = wrap.querySelector(".drift-nb-pick-visible");
      if (!vis) return;
      vis.setAttribute("contenteditable", "true");
      vis.classList.add("drift-editable-text");
      var sk = wrap.getAttribute("data-drift-sel-key");
      var ri = wrap.getAttribute("data-drift-row-idx");
      var ch = wrap.getAttribute("data-drift-col-header");
      if (sk) vis.setAttribute("data-drift-sel-key", sk);
      if (ri !== null) vis.setAttribute("data-drift-row-idx", ri);
      if (ch) vis.setAttribute("data-drift-col-header", ch);
      vis.addEventListener("input", function() {
        if (typeof window.DriftReviewMarkDirty === "function") {
          window.DriftReviewMarkDirty();
        }
      });
    });
  }

  window.DriftReviewResetEdits = function() {
    document.querySelectorAll(".drift-nb-pick[data-drift-sel-key]").forEach(function(wrap) {
      var vis = wrap.querySelector(".drift-nb-pick-visible");
      if (!vis || wrap.__driftOrigInner === undefined) return;
      vis.innerHTML = wrap.__driftOrigInner;
    });
    document.querySelectorAll(".drift-editable-text[data-drift-sel-key]").forEach(function(el) {
      if (el.__driftOrigText === undefined) return;
      el.textContent = el.__driftOrigText;
    });
    if (typeof window.DriftReviewMarkClean === "function") {
      window.DriftReviewMarkClean();
    }
  };

  document.addEventListener("click", function(evt) {
    var clearBtn = evt.target.closest("button.js-drift-clear-review");
    if (!clearBtn) return;
    evt.preventDefault();
    window.DriftReviewResetEdits();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", captureDriftReviewBaselines);
  } else {
    captureDriftReviewBaselines();
  }
})();
</script>
{% endif %}
