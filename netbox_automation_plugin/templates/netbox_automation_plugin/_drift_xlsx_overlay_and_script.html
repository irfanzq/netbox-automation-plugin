{% load i18n %}
{# NetBox may set CSRF_COOKIE_HTTPONLY; drift JS must read the token from this input. #}
<form id="drift-review-csrf-anchor" class="d-none" aria-hidden="true">{% csrf_token %}</form>
<script>
(function() {
  function csrfToken() {
    var anchor = document.querySelector("#drift-review-csrf-anchor input[name=csrfmiddlewaretoken]");
    if (anchor && anchor.value) return anchor.value;
    var inp = document.querySelector("input[name=csrfmiddlewaretoken]");
    if (inp && inp.value) return inp.value;
    var m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : "";
  }
  /** Avoid dumping full Django HTML error pages into alert(). */
  function shortHttpError(status, raw) {
    var s = status || "";
    var t = (raw || "").trim();
    if (!t) return "HTTP " + s;
    if (t.indexOf("<!DOCTYPE") === 0 || t.indexOf("<html") >= 0 || t.indexOf("<h1") >= 0) {
      var m = t.match(/<title>([^<]+)<\/title>/i);
      if (m && m[1]) return "HTTP " + s + ": " + m[1].trim();
      return "HTTP " + s + ": non-JSON error response (see browser Network tab for details).";
    }
    if (t.length > 240) return t.slice(0, 240) + "…";
    return t;
  }
  function readErrorBodyAsThrow(r) {
    return r.text().then(function(t) {
      throw new Error(shortHttpError(r.status, t));
    });
  }
  var overlay = document.getElementById("drift-xlsx-loading-overlay");
  var xlsxOverlayDefaultMsg = null;
  function xlsxOverlayMessageEl() {
    return overlay ? overlay.querySelector(".drift-loading-message") : null;
  }
  function showXlsxOverlay(message) {
    if (!overlay) return;
    var msgEl = xlsxOverlayMessageEl();
    if (msgEl) {
      if (xlsxOverlayDefaultMsg === null) {
        xlsxOverlayDefaultMsg = msgEl.textContent;
      }
      if (message) {
        msgEl.textContent = message;
      } else {
        msgEl.textContent = xlsxOverlayDefaultMsg;
      }
    }
    overlay.classList.add("drift-loading-visible");
    overlay.setAttribute("aria-hidden", "false");
  }
  function hideXlsxOverlay() {
    if (!overlay) return;
    overlay.classList.remove("drift-loading-visible");
    overlay.setAttribute("aria-hidden", "true");
    var msgEl = xlsxOverlayMessageEl();
    if (msgEl && xlsxOverlayDefaultMsg !== null) {
      msgEl.textContent = xlsxOverlayDefaultMsg;
    }
  }
  function downloadBlob(blob, filename) {
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename || "report.xlsx";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
  function fetchGetXlsx(url, filename) {
    showXlsxOverlay();
    var sep = url.indexOf("?") >= 0 ? "&" : "?";
    var bustUrl = url + sep + "_drift_xlsx_cb=" + Date.now();
    return fetch(bustUrl, { credentials: "same-origin" })
      .then(function(r) {
        if (!r.ok) return readErrorBodyAsThrow(r);
        return r.blob();
      })
      .then(function(blob) { downloadBlob(blob, filename); })
      .catch(function(e) { console.warn("Excel download failed:", e); })
      .finally(hideXlsxOverlay);
  }
  document.addEventListener("click", function(e) {
    var a = e.target.closest("a.js-drift-xlsx-get");
    if (!a || !a.getAttribute("href")) return;
    e.preventDefault();
    var href = a.getAttribute("href");
    var name = a.getAttribute("data-download-name") || "drift-report.xlsx";
    fetchGetXlsx(href, name);
  });
  document.addEventListener("click", function(e) {
    var btn = e.target.closest("button.js-drift-xlsx-modified-live");
    if (!btn) return;
    e.preventDefault();
    var postUrl = (window._driftXlsxUiConfig && window._driftXlsxUiConfig.postModifiedUrl) || "";
    if (!postUrl) {
      alert("{% trans 'Modified Excel URL is not configured on this page.' %}");
      return;
    }
    var tok = csrfToken();
    if (!tok) {
      alert("{% trans 'Missing CSRF token. Reload the page and try again.' %}");
      return;
    }
    var overrides = {};
    try {
      var collect = window.DriftReviewCollectOverrides;
      overrides = typeof collect === "function" ? collect() : {};
    } catch (err) {
      console.warn("DriftReviewCollectOverrides failed:", err);
      alert("{% trans 'Could not read cell edits from the report.' %}");
      return;
    }
    showXlsxOverlay();
    var cfg = window._driftXlsxUiConfig || {};
    var runId = cfg.auditRunId != null && cfg.auditRunId !== "" ? cfg.auditRunId : null;
    fetch(postUrl, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": tok
      },
      body: JSON.stringify({ overrides: overrides, run_id: runId })
    })
      .then(function(r) {
        if (!r.ok) return readErrorBodyAsThrow(r);
        return r.blob();
      })
      .then(function(blob) { downloadBlob(blob, "drift-report-modified.xlsx"); })
      .catch(function(err) {
        console.warn("Modified Excel download failed:", err);
        alert("{% trans 'Modified Excel download failed.' %} " + (err && err.message ? err.message : ""));
      })
      .finally(hideXlsxOverlay);
  });
  document.addEventListener("click", function(e) {
    var saveBtn = e.target.closest("button.js-drift-save-review");
    if (!saveBtn) return;
    e.preventDefault();
    var url = (window._driftXlsxUiConfig && window._driftXlsxUiConfig.saveReviewUrl) || "";
    if (!url) {
      alert("{% trans 'Save URL is not configured (no drift run id). Run a new audit or open this report from history.' %}");
      return;
    }
    var tok = csrfToken();
    if (!tok) {
      alert("{% trans 'Missing CSRF token. Reload the page and try again.' %}");
      return;
    }
    var overrides = {};
    try {
      var collect = window.DriftReviewCollectOverrides;
      overrides = typeof collect === "function" ? collect() : {};
    } catch (err) {
      console.warn("DriftReviewCollectOverrides failed:", err);
      alert("{% trans 'Could not read cell edits from the report.' %}");
      return;
    }
    saveBtn.disabled = true;
    var saveWillNavigate = false;
    showXlsxOverlay("{% trans 'Saving…' %}");
    fetch(url, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": tok
      },
      body: JSON.stringify({ overrides: overrides })
    })
      .then(function(r) {
        return r.text().then(function(t) {
          var j = {};
          try {
            j = t ? JSON.parse(t) : {};
          } catch (ignore) {
            j = {
              ok: false,
              error: shortHttpError(r.status, t || r.statusText || "Save failed"),
            };
          }
          return { r: r, j: j };
        });
      })
      .then(function(pair) {
        if (!pair.r.ok || !pair.j.ok) {
          var rawErr = pair.j && pair.j.error;
          var msg =
            rawErr && String(rawErr).length
              ? String(rawErr)
              : shortHttpError(pair.r.status, "");
          throw new Error(msg);
        }
        if (pair.j.reload && window.DriftReviewReloadAfterSave === true) {
          saveWillNavigate = true;
          var nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set("view", "modified");
          window.location.href = nextUrl.toString();
          return;
        }
        if (typeof window.DriftReviewMarkClean === "function") {
          window.DriftReviewMarkClean();
        }
        if (typeof window.DriftReviewOnSaved === "function") {
          window.DriftReviewOnSaved(pair.j);
        } else {
          alert("{% trans 'Edits saved.' %}");
        }
      })
      .catch(function(err) {
        console.warn("Save review failed:", err);
        alert("{% trans 'Could not save edits.' %} " + (err && err.message ? err.message : ""));
      })
      .finally(function() {
        if (!saveWillNavigate) {
          hideXlsxOverlay();
        }
        saveBtn.disabled = false;
      });
  });
})();
</script>
